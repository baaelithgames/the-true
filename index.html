<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="The True - Independent Investigation Journal. Uncovering what history tried to erase.">
<meta property="og:title" content="The True - The Bloody Moon Order">
<meta property="og:description" content="A document recovered from the Bibliotheque Nationale de France. A letter. A signature : M. Nostredamme.">
<title>THE TRUE - Independent Investigation Journal</title>
<link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=IM+Fell+English:ital@0;1&family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root{--ink:#0A0908;--paper:#F2E8D5;--paper-dark:#DDD0B3;--paper-mid:#E8DCC4;--blood:#8B0000;--blood-bright:#C0392B;--gold:#B8962E;--mist:#6B6055;--red-dim:rgba(139,0,0,0.15);}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--ink);color:var(--paper);font-family:'IM Fell English',Georgia,serif;min-height:100vh;overflow-x:hidden;}
body::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;opacity:0.4;}
.lang-bar{background:var(--blood);text-align:center;padding:6px;font-family:'Courier Prime',monospace;font-size:11px;letter-spacing:0.2em;position:sticky;top:0;z-index:100;}
.lang-bar button{background:none;border:none;color:var(--paper);cursor:pointer;font-family:inherit;font-size:inherit;letter-spacing:inherit;padding:0 12px;opacity:0.6;transition:opacity 0.2s;}
.lang-bar button.active{opacity:1;font-weight:700;}
.lang-bar span{color:rgba(242,232,213,0.3);}
.masthead{border-bottom:3px double var(--paper-dark);padding:2.5rem 2rem 1.5rem;text-align:center;position:relative;background:linear-gradient(180deg,rgba(139,0,0,0.06) 0%,transparent 100%);}
.masthead::after{content:'* * *';position:absolute;bottom:-0.65rem;left:50%;transform:translateX(-50%);background:var(--ink);padding:0 1rem;color:var(--gold);font-size:10px;letter-spacing:4px;}
.masthead-eyebrow{font-family:'Courier Prime',monospace;font-size:11px;letter-spacing:0.3em;color:var(--gold);text-transform:uppercase;margin-bottom:1rem;}
.masthead-title{font-family:'UnifrakturMaguntia',cursive;font-size:clamp(3.5rem,10vw,7rem);color:var(--paper);line-height:1;margin-bottom:0.25rem;text-shadow:2px 2px 0px rgba(0,0,0,0.5);}
.masthead-subtitle{font-family:'Courier Prime',monospace;font-size:10px;letter-spacing:0.35em;color:var(--mist);text-transform:uppercase;margin-bottom:1.25rem;}
.masthead-rule{display:flex;align-items:center;justify-content:center;gap:1rem;margin:1rem 0;color:var(--gold);font-size:12px;letter-spacing:0.3em;}
.masthead-rule::before,.masthead-rule::after{content:'';flex:1;height:1px;background:var(--paper-dark);opacity:0.4;}
.masthead-meta{display:flex;justify-content:space-between;align-items:center;font-family:'Courier Prime',monospace;font-size:10px;color:var(--mist);letter-spacing:0.1em;padding-top:0.75rem;border-top:1px solid rgba(242,232,213,0.1);flex-wrap:wrap;gap:0.5rem;}
.countdown-bar{background:rgba(139,0,0,0.2);border-bottom:1px solid rgba(139,0,0,0.4);padding:0.75rem 2rem;display:flex;align-items:center;justify-content:center;gap:1.5rem;flex-wrap:wrap;}
.countdown-label{font-family:'Courier Prime',monospace;font-size:10px;letter-spacing:0.3em;color:var(--blood-bright);text-transform:uppercase;}
.countdown-timer{display:flex;gap:1rem;align-items:center;}
.countdown-unit{text-align:center;}
.countdown-num{font-family:'Courier Prime',monospace;font-size:1.4rem;font-weight:700;color:var(--blood-bright);display:block;line-height:1;}
.countdown-unit-label{font-family:'Courier Prime',monospace;font-size:9px;letter-spacing:0.2em;color:var(--mist);text-transform:uppercase;}
.countdown-sep{color:var(--blood-bright);font-size:1.2rem;opacity:0.5;}
.page{max-width:1100px;margin:0 auto;padding:2rem 1.5rem 4rem;}
.section-nav{display:flex;gap:0;border-bottom:2px solid rgba(242,232,213,0.15);margin-bottom:2.5rem;overflow-x:auto;}
.nav-item{font-family:'Courier Prime',monospace;font-size:10px;letter-spacing:0.25em;text-transform:uppercase;color:var(--mist);padding:0.75rem 1.25rem;border-bottom:2px solid transparent;margin-bottom:-2px;cursor:pointer;white-space:nowrap;transition:all 0.2s;background:none;border-top:none;border-left:none;border-right:none;}
.nav-item:hover{color:var(--paper);}
.nav-item.active{color:var(--blood-bright);border-bottom-color:var(--blood-bright);}
.breaking{border:1px solid rgba(139,0,0,0.5);background:rgba(139,0,0,0.08);padding:0.75rem 1.25rem;margin-bottom:2rem;display:flex;align-items:center;gap:1rem;animation:pulse-border 3s ease-in-out infinite;}
@keyframes pulse-border{0%,100%{border-color:rgba(139,0,0,0.5);}50%{border-color:rgba(192,57,43,0.8);}}
.breaking-tag{font-family:'Courier Prime',monospace;font-size:9px;letter-spacing:0.3em;background:var(--blood);color:var(--paper);padding:3px 8px;flex-shrink:0;text-transform:uppercase;}
.breaking-text{font-family:'Courier Prime',monospace;font-size:11px;color:var(--paper-dark);}
.section{display:none;}
.section.active{display:block;}
.article-header{border-bottom:1px solid rgba(242,232,213,0.15);padding-bottom:1.5rem;margin-bottom:2rem;}
.article-kicker{font-family:'Courier Prime',monospace;font-size:10px;letter-spacing:0.35em;color:var(--blood-bright);text-transform:uppercase;margin-bottom:0.75rem;}
.article-headline{font-family:'Playfair Display',Georgia,serif;font-size:clamp(1.8rem,4vw,3rem);font-weight:900;line-height:1.15;color:var(--paper);margin-bottom:1rem;}
.article-deck{font-family:'Playfair Display',Georgia,serif;font-style:italic;font-size:1.1rem;color:var(--paper-dark);line-height:1.6;margin-bottom:1rem;}
.article-byline{font-family:'Courier Prime',monospace;font-size:10px;letter-spacing:0.15em;color:var(--mist);text-transform:uppercase;}
.article-body{display:grid;grid-template-columns:1fr 320px;gap:3rem;align-items:start;}
.article-text p{font-size:1.05rem;line-height:1.85;color:rgba(242,232,213,0.85);margin-bottom:1.25rem;}
.article-text h3{font-family:'Playfair Display',Georgia,serif;font-size:1.2rem;font-weight:700;color:var(--paper);margin:2rem 0 0.75rem;padding-top:1.5rem;border-top:1px solid rgba(242,232,213,0.1);}
.blockquote{border-left:2px solid var(--blood);padding:0.75rem 1.25rem;margin:1.5rem 0;background:rgba(139,0,0,0.06);}
.blockquote p{font-family:'Playfair Display',Georgia,serif;font-style:italic;font-size:1rem;color:var(--paper-dark);line-height:1.7;}
.cipher-block{background:rgba(242,232,213,0.04);border:1px solid rgba(242,232,213,0.1);padding:1.25rem;margin:1.5rem 0;}
.cipher-fr{font-size:1rem;color:var(--paper);margin-bottom:0.75rem;line-height:1.7;font-style:italic;}
.cipher-en{font-size:0.9rem;color:var(--mist);line-height:1.7;font-style:italic;}
.cipher-label{font-family:'Courier Prime',monospace;font-size:9px;letter-spacing:0.3em;color:var(--blood-bright);text-transform:uppercase;margin-bottom:0.5rem;}
.article-sidebar{position:sticky;top:80px;}
.sidebar-doc{border:1px solid rgba(242,232,213,0.15);margin-bottom:1.5rem;overflow:hidden;}
.sidebar-doc img{width:100%;display:block;opacity:0.9;transition:opacity 0.3s;cursor:zoom-in;}
.sidebar-doc img:hover{opacity:1;}
.sidebar-doc-caption{padding:0.75rem;background:rgba(242,232,213,0.04);border-top:1px solid rgba(242,232,213,0.1);}
.sidebar-doc-caption p{font-family:'Courier Prime',monospace;font-size:10px;letter-spacing:0.1em;color:var(--mist);line-height:1.5;}
.sidebar-doc-caption .status{display:inline-block;background:rgba(139,0,0,0.3);color:var(--blood-bright);font-size:9px;letter-spacing:0.2em;padding:2px 8px;margin-bottom:6px;text-transform:uppercase;}
.sidebar-update{border:1px solid rgba(139,0,0,0.3);background:rgba(139,0,0,0.06);padding:1rem;margin-bottom:1.5rem;}
.sidebar-update-label{font-family:'Courier Prime',monospace;font-size:9px;letter-spacing:0.3em;color:var(--blood-bright);text-transform:uppercase;margin-bottom:0.5rem;}
.sidebar-update p{font-size:0.85rem;color:var(--paper-dark);line-height:1.6;font-style:italic;}
.docs-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1.5rem;}
.doc-card{border:1px solid rgba(242,232,213,0.12);background:rgba(242,232,213,0.03);overflow:hidden;transition:border-color 0.2s;}
.doc-card:hover{border-color:rgba(139,0,0,0.5);}
.doc-card-img{width:100%;aspect-ratio:3/4;object-fit:cover;display:block;opacity:0.85;transition:opacity 0.3s;}
.doc-card:hover .doc-card-img{opacity:1;}
.doc-card-body{padding:1rem;border-top:1px solid rgba(242,232,213,0.08);}
.doc-status{font-family:'Courier Prime',monospace;font-size:9px;letter-spacing:0.25em;text-transform:uppercase;padding:2px 8px;display:inline-block;margin-bottom:8px;}
.status-active{background:rgba(139,0,0,0.3);color:var(--blood-bright);}
.status-partial{background:rgba(184,150,46,0.2);color:var(--gold);}
.status-locked{background:rgba(107,96,85,0.3);color:var(--mist);}
.doc-title{font-family:'Playfair Display',Georgia,serif;font-size:1rem;font-weight:700;color:var(--paper);margin-bottom:6px;line-height:1.3;}
.doc-desc{font-family:'Courier Prime',monospace;font-size:10px;color:var(--mist);line-height:1.5;letter-spacing:0.05em;}
.doc-placeholder{width:100%;aspect-ratio:3/4;background:rgba(242,232,213,0.03);display:flex;align-items:center;justify-content:center;border-bottom:1px solid rgba(242,232,213,0.08);}
.doc-placeholder-inner{text-align:center;color:var(--mist);}
.doc-placeholder-icon{font-size:2rem;margin-bottom:0.5rem;display:block;opacity:0.3;}
.doc-placeholder-text{font-family:'Courier Prime',monospace;font-size:10px;letter-spacing:0.2em;text-transform:uppercase;opacity:0.4;}
.investigation-timeline{position:relative;padding-left:2rem;}
.investigation-timeline::before{content:'';position:absolute;left:0;top:0;bottom:0;width:1px;background:linear-gradient(to bottom,var(--blood),transparent);opacity:0.4;}
.timeline-entry{position:relative;margin-bottom:2rem;}
.timeline-entry::before{content:'';position:absolute;left:-2.35rem;top:0.4rem;width:8px;height:8px;border-radius:50%;background:var(--blood-bright);border:1px solid var(--blood);}
.timeline-date{font-family:'Courier Prime',monospace;font-size:10px;letter-spacing:0.2em;color:var(--blood-bright);text-transform:uppercase;margin-bottom:0.4rem;}
.timeline-title{font-family:'Playfair Display',Georgia,serif;font-size:1.1rem;font-weight:700;color:var(--paper);margin-bottom:0.4rem;}
.timeline-body{font-size:0.9rem;color:rgba(242,232,213,0.65);line-height:1.7;}
.timeline-entry.redacted .timeline-title{background:var(--paper);color:var(--paper);user-select:none;}
.timeline-entry.redacted .timeline-body{filter:blur(3px);pointer-events:none;}
.redacted-label{font-family:'Courier Prime',monospace;font-size:9px;letter-spacing:0.2em;color:var(--mist);text-transform:uppercase;display:block;margin-top:4px;filter:none !important;}
.about-content{max-width:680px;}
.about-content p{font-size:1rem;line-height:1.85;color:rgba(242,232,213,0.8);margin-bottom:1.25rem;}
.about-warning{border:1px solid rgba(139,0,0,0.4);padding:1.25rem;background:rgba(139,0,0,0.06);margin-top:2rem;}
.about-warning p{font-family:'Courier Prime',monospace;font-size:11px;letter-spacing:0.05em;color:var(--paper-dark);line-height:1.7;}
.about-email{margin-top:1rem;}
.about-email a{font-family:'Courier Prime',monospace;font-size:12px;letter-spacing:0.15em;color:var(--blood-bright);text-decoration:none;border-bottom:1px solid rgba(192,57,43,0.3);transition:border-color 0.2s;}
.about-email a:hover{border-color:var(--blood-bright);}
.section-heading{font-family:'Playfair Display',Georgia,serif;font-size:1.6rem;font-weight:900;color:var(--paper);margin-bottom:0.5rem;}
.section-sub{font-family:'Courier Prime',monospace;font-size:10px;letter-spacing:0.25em;color:var(--mist);text-transform:uppercase;margin-bottom:2rem;padding-bottom:1rem;border-bottom:1px solid rgba(242,232,213,0.1);}
footer{border-top:1px solid rgba(242,232,213,0.08);padding:2rem 1.5rem;text-align:center;max-width:1100px;margin:0 auto;}
footer p{font-family:'Courier Prime',monospace;font-size:10px;letter-spacing:0.2em;color:var(--mist);margin-bottom:0.25rem;}
.footer-blood{color:var(--blood-bright);font-size:1rem;margin-bottom:0.5rem;display:block;}
.footer-links{display:flex;gap:1.5rem;justify-content:center;flex-wrap:wrap;margin:1rem 0;}
.footer-links a{font-family:'Courier Prime',monospace;font-size:10px;letter-spacing:0.15em;color:rgba(242,232,213,0.25);text-decoration:none;text-transform:uppercase;border-bottom:1px solid rgba(242,232,213,0.08);transition:color 0.2s;}
.footer-links a:hover{color:var(--gold);}
.footer-disclaimer{font-size:9px !important;color:rgba(242,232,213,0.12) !important;margin-top:0.5rem;}
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:1000;align-items:center;justify-content:center;cursor:zoom-out;}
.lightbox.open{display:flex;}
.lightbox img{max-width:90vw;max-height:90vh;object-fit:contain;}
@media(max-width:720px){.article-body{grid-template-columns:1fr;}.article-sidebar{order:-1;}}
</style>
</head>
<body>

<div class="lang-bar">
  <button class="active" id="btn-en" onclick="setLang('en')">EN</button>
  <span>|</span>
  <button id="btn-fr" onclick="setLang('fr')">FR</button>
</div>

<header class="masthead">
  <p class="masthead-eyebrow" id="t-masthead-eyebrow"></p>
  <h1 class="masthead-title">The True</h1>
  <p class="masthead-subtitle" id="t-masthead-subtitle"></p>
  <div class="masthead-rule">* * *</div>
  <div class="masthead-meta">
    <span id="t-meta-date"></span>
    <span id="t-meta-continues"></span>
    <span>Vol. I - No. 1</span>
  </div>
</header>

<div class="countdown-bar">
  <span class="countdown-label" id="t-countdown-label"></span>
  <div class="countdown-timer">
    <div class="countdown-unit">
      <span class="countdown-num" id="cd-days">00</span>
      <span class="countdown-unit-label" id="t-cd-days"></span>
    </div>
    <span class="countdown-sep">:</span>
    <div class="countdown-unit">
      <span class="countdown-num" id="cd-hours">00</span>
      <span class="countdown-unit-label" id="t-cd-hours"></span>
    </div>
    <span class="countdown-sep">:</span>
    <div class="countdown-unit">
      <span class="countdown-num" id="cd-mins">00</span>
      <span class="countdown-unit-label" id="t-cd-mins"></span>
    </div>
    <span class="countdown-sep">:</span>
    <div class="countdown-unit">
      <span class="countdown-num" id="cd-secs">00</span>
      <span class="countdown-unit-label" id="t-cd-secs"></span>
    </div>
  </div>
</div>

<main class="page">

  <nav class="section-nav">
    <button class="nav-item active" onclick="showSection('investigation',this)" id="t-nav-investigation"></button>
    <button class="nav-item" onclick="showSection('documents',this)" id="t-nav-documents"></button>
    <button class="nav-item" onclick="showSection('timeline',this)" id="t-nav-timeline"></button>
    <button class="nav-item" onclick="showSection('about',this)" id="t-nav-about"></button>
  </nav>

  <div class="breaking">
    <span class="breaking-tag" id="t-breaking-tag"></span>
    <span class="breaking-text" id="t-breaking-text"></span>
  </div>

  <!-- INVESTIGATION -->
  <section class="section active" id="section-investigation">
    <div class="article-header">
      <p class="article-kicker" id="t-kicker"></p>
      <h2 class="article-headline" id="t-headline"></h2>
      <p class="article-deck" id="t-deck"></p>
      <p class="article-byline" id="t-byline"></p>
    </div>
    <div class="article-body">
      <div class="article-text">
        <p id="t-p1"></p>
        <h3 id="t-h-doc"></h3>
        <p id="t-p2"></p>
        <p id="t-p3"></p>
        <div class="cipher-block">
          <p class="cipher-label" id="t-cipher1-label"></p>
          <p class="cipher-fr" id="t-cipher1-fr"></p>
          <p class="cipher-en" id="t-cipher1-en"></p>
        </div>
        <p id="t-p4"></p>
        <div class="cipher-block">
          <p class="cipher-label" id="t-cipher2-label"></p>
          <p class="cipher-fr" id="t-cipher2-fr"></p>
          <p class="cipher-en" id="t-cipher2-en"></p>
        </div>
        <div class="blockquote"><p id="t-bq1"></p></div>
        <p id="t-p5"></p>
        <h3 id="t-h-secrets"></h3>
        <p id="t-p6"></p>
        <p id="t-p7"></p>
        <div class="blockquote"><p id="t-bq2"></p></div>
        <h3 id="t-h-influence"></h3>
        <p id="t-p8"></p>
        <p id="t-p9"></p>
        <h3 id="t-h-silence"></h3>
        <p id="t-p10"></p>
        <div class="blockquote"><p id="t-bq3"></p></div>
        <p id="t-p11"></p>
        <p style="font-family:'Courier Prime',monospace;font-size:11px;letter-spacing:0.1em;color:var(--blood-bright);margin-top:2rem;" id="t-ending"></p>
      </div>
      <aside class="article-sidebar">
        <div class="sidebar-update">
          <p class="sidebar-update-label" id="t-update-label"></p>
          <p id="t-update-text"></p>
        </div>
        <div class="sidebar-doc">
          <img src="Nostradamus_Lettre_Medicis1.png" alt="Recovered parchment" onclick="openLightbox(this.src)">
          <div class="sidebar-doc-caption">
            <span class="status" id="t-doc-status"></span>
            <p id="t-doc-caption"></p>
          </div>
        </div>
      </aside>
    </div>
  </section>

  <!-- DOCUMENTS -->
  <section class="section" id="section-documents">
    <h2 class="section-heading" id="t-docs-heading"></h2>
    <p class="section-sub" id="t-docs-sub"></p>
    <div class="docs-grid">
      <div class="doc-card">
        <img class="doc-card-img" src="Nostradamus_Lettre_Medicis1.png" alt="Nostradamus Letter" onclick="openLightbox(this.src)" style="cursor:zoom-in;">
        <div class="doc-card-body">
          <span class="doc-status status-active" id="t-doc1-status"></span>
          <p class="doc-title" id="t-doc1-title"></p>
          <p class="doc-desc" id="t-doc1-desc"></p>
        </div>
      </div>
      <div class="doc-card">
        <div class="doc-placeholder"><div class="doc-placeholder-inner"><span class="doc-placeholder-icon">&#9632;</span><p class="doc-placeholder-text" id="t-doc2-placeholder"></p></div></div>
        <div class="doc-card-body">
          <span class="doc-status status-partial" id="t-doc2-status"></span>
          <p class="doc-title" id="t-doc2-title"></p>
          <p class="doc-desc" id="t-doc2-desc"></p>
        </div>
      </div>
      <div class="doc-card">
        <div class="doc-placeholder"><div class="doc-placeholder-inner"><span class="doc-placeholder-icon">&#9632;</span><p class="doc-placeholder-text" id="t-doc3-placeholder"></p></div></div>
        <div class="doc-card-body">
          <span class="doc-status status-locked" id="t-doc3-status"></span>
          <p class="doc-title" id="t-doc3-title"></p>
          <p class="doc-desc" id="t-doc3-desc"></p>
        </div>
      </div>
    </div>
  </section>

  <!-- TIMELINE -->
  <section class="section" id="section-timeline">
    <h2 class="section-heading" id="t-tl-heading"></h2>
    <p class="section-sub" id="t-tl-sub"></p>
    <div class="investigation-timeline">
      <div class="timeline-entry">
        <p class="timeline-date">c. 1503 - 1566</p>
        <p class="timeline-title" id="t-tl1-title"></p>
        <p class="timeline-body" id="t-tl1-body"></p>
      </div>
      <div class="timeline-entry">
        <p class="timeline-date">c. 1556</p>
        <p class="timeline-title" id="t-tl2-title"></p>
        <p class="timeline-body" id="t-tl2-body"></p>
      </div>
      <div class="timeline-entry">
        <p class="timeline-date" id="t-tl3-date"></p>
        <p class="timeline-title" id="t-tl3-title"></p>
        <p class="timeline-body" id="t-tl3-body"></p>
      </div>
      <div class="timeline-entry">
        <p class="timeline-date">April 2026</p>
        <p class="timeline-title" id="t-tl4-title"></p>
        <p class="timeline-body" id="t-tl4-body"></p>
      </div>
      <div class="timeline-entry redacted">

function setLang(l) {

  document.getElementById('btn-en').classList.toggle('active', l === 'en');
  document.getElementById('btn-fr').classList.toggle('active', l === 'fr');
  document.documentElement.lang = l;
  for (var key in d) {
    var el = document.getElementById('t-' + key);
    if (el) el.textContent = d[key];
  }
}

function showSection(name, btn) {
  document.querySelectorAll('.section').forEach(function(s){s.classList.remove('active');});
  document.querySelectorAll('.nav-item').forEach(function(b){b.classList.remove('active');});
  document.getElementById('section-' + name).classList.add('active');
  if (btn) btn.classList.add('active');
}

var target = new Date('2028-12-31T00:00:00');
function updateCountdown() {
  var now = new Date();
  var diff = target - now;
  if (diff <= 0) { return; }
  var d = Math.floor(diff / 86400000);
  var h = Math.floor((diff % 86400000) / 3600000);
  var m = Math.floor((diff % 3600000) / 60000);
  var s = Math.floor((diff % 60000) / 1000);
  document.getElementById('cd-days').textContent = String(d).padStart(2,'0');
  document.getElementById('cd-hours').textContent = String(h).padStart(2,'0');
  document.getElementById('cd-mins').textContent = String(m).padStart(2,'0');
  document.getElementById('cd-secs').textContent = String(s).padStart(2,'0');
}
updateCountdown();
setInterval(updateCountdown, 1000);
